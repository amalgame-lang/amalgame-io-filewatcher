# Package manifest — amalgame-io-filewatcher
#
# File-watch facades with two backends:
#
#   FileWatcher(path)             — single file
#     .Exists / .Changed / .GetPath          (v0.1, kept)
#     .Poll() → List<WatchEvent>             (v0.2, typed events)
#     .BackendName() → "inotify" or "polling" (v0.4)
#
#   DirectoryWatcher(path, recursive) — directory tree
#     .Poll() → List<WatchEvent>
#     .GetPath / .IsRecursive / .Count       (v0.2)
#     .BackendName() → "inotify" or "polling" (v0.4)
#
#   WatchEvent      — { Kind, Path, RenamedTo, TimestampMs }
#   WatchEventKind  — Created / Modified / Deleted / Renamed
#                     (real enum since v0.3.0 — was a class with
#                     static int methods in v0.2.x as an amc-cgen
#                     workaround; polling backend never emits
#                     Renamed — reserved for the v0.5 native
#                     rename-pairing pass)
#
# Backend selection (v0.4):
#   - On Linux, `inotify_init1` is tried first. Watches install on
#     the file (FileWatcher) or every subtree directory
#     (DirectoryWatcher, recursive when asked). Poll() drains the
#     kernel queue; events propagate within ms instead of the
#     polling-loop interval.
#   - On non-Linux (macOS, Windows) or when inotify_init fails
#     (kernel limit hit, unprivileged container), the polling
#     backend takes over — same surface, same WatchEvent shape.
#     v0.3's mtime-poll behaviour is preserved bit-for-bit.
#
# Cross-platform via stat() / _stat64 + opendir/readdir on POSIX
# and FindFirstFileA/FindNextFileA on Windows. Originally bundled
# in amc's src/stdlib/io_filewatcher.am; extracted into this
# external package as part of the framework split.
#
# Out of scope (v0.5+):
#   - FSEvents on macOS, ReadDirectoryChangesW on Windows
#     (polling fallback covers these today)
#   - Rename pairing via IN_MOVED_FROM/IN_MOVED_TO cookies
#     (currently surfaces as Deleted + Created)
#
# Installation:
#
#   amc package add io-filewatcher                  # via curated index
#   amc package add github.com/amalgame-lang/amalgame-io-filewatcher@v0.4.0

[package]
name              = "amalgame-io-filewatcher"
version           = "0.4.0"
license           = "Apache-2.0"
description       = "File-watch facade with inotify (Linux) + polling backend, typed WatchEvent records, FileWatcher + DirectoryWatcher."
authors           = ["Bastien Mouget"]
required-amalgame = ">=0.8.47"
schema-version    = 1

[stdlib]
classes   = ["FileWatcher", "DirectoryWatcher", "WatchEvent", "DirSnapshot"]
header    = "facade-stub.h"
namespace = "Amalgame.IO.FileWatcher"
facade    = "facade.am"
