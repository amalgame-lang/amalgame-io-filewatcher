name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test against amc ${{ matrix.amc-tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # v0.2.0+ requires amc 0.8.29+ for the `classes = [...]`
        # multi-class manifest form (WatchEventKind, WatchEvent,
        # DirectoryWatcher, DirSnapshot ride alongside FileWatcher).
        # Pinned to the latest release; bump the tag here when
        # depending on a newer amc feature.
        amc-tag: [v0.8.45]
    steps:
      - name: Checkout package
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgc-dev

      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"
          VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p $RUNNER_TEMP/amc-install
          tar -xzf amc.tar.gz -C $RUNNER_TEMP/amc-install --strip-components=1
          # New release layout (post-install.sh refactor):
          #   bin/amc + share/amalgame/{runtime,stdlib,lib}/
          echo "AMC=$RUNNER_TEMP/amc-install/bin/amc" >> $GITHUB_ENV
          echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/share/amalgame/runtime" >> $GITHUB_ENV

      - name: Verify amc
        run: $AMC --version

      - name: Run tests
        run: ./tests/run_tests.sh "$AMC"
